name: Wiki.js Sync

on:
  push:
    branches:
      - main

jobs:
  force-wikijs-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Trigger Wiki.js Import and Force Sync
        run: |
          curl -X POST "https://docs.vasseurlaurent.com/api/admin/storage/git/purge" \
            -H "Authorization: Bearer ${{ secrets.WIKIJS_API_TOKEN }}" \
            -H "Content-Type: application/json"
          curl -X POST "https://docs.vasseurlaurent.com/api/admin/storage/git/force-sync" \
            -H "Authorization: Bearer ${{ secrets.WIKIJS_API_TOKEN }}" \
            -H "Content-Type: application/json"
          curl -X POST "https://docs.vasseurlaurent.com/api/admin/storage/git/import" \
            -H "Authorization: Bearer ${{ secrets.WIKIJS_API_TOKEN }}" \
            -H "Content-Type: application/json"

      - name: Cleanup orphan Wiki.js pages
        uses: actions/setup-node@v3
        with:
          node-version: 22
      - run: npm install node-fetch@2
      - run: node ./.github/tools/file-cleanup.js
        env:
          WIKIJS_API_TOKEN: ${{ secrets.WIKIJS_API_TOKEN }}
